services:
  frontend:
    build: 
      context: ../alex-frontend/vue-project
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.docker.json:/app/config/config.json
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=alex_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
    # This named volume persists data across "docker compose up --build -d".
    # CAUTION: "docker compose down -v" DELETES this volume and all DB data!
    # Use "docker compose down" (without -v) to keep your data.
