services:
  nginx:
    image: nginx:alpine
    pull_policy: never
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
      - frontend
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    network_mode: host
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

  frontend:
    image: alex-backend-frontend:latest
    pull_policy: never
    networks:
      - app-network
    restart: unless-stopped

  api:
    image: alex-backend-api:latest
    pull_policy: never
    volumes:
      - ./config/config.json:/app/config/config.json
    depends_on:
      db:
        condition: service_healthy
    environment:
      BASE_URL: "https://alexclubapp.de"
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    pull_policy: never
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=alex_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alex_backend"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:

networks:
  app-network:
    driver: bridge
